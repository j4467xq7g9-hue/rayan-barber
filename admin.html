<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAYAN ADMIN PANEL</title> 
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Noto+Sans+Arabic:wght@400;700&display=swap');
        :root { --gold: #D4AF37; --dark: #050505; --card: rgba(15, 15, 15, 0.98); }
        
        html, body { 
            height: 100%; margin: 0; padding: 0; overflow: hidden; 
            background: #000; color: #fff; font-family: 'Noto Sans Arabic', sans-serif; 
        }

        #app-wrapper {
            display: flex; flex-direction: column; height: 100vh;
        }

        #login-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column;
        }
        .login-box {
            background: #111; padding: 30px; border-radius: 20px; border: 1px solid var(--gold); text-align: center; width: 80%; max-width: 300px;
        }

        header { 
            flex-shrink: 0; text-align: center; padding: 18px 0; background: #080808; border-bottom: 2px solid var(--gold); z-index: 100;
        }
        header h1 { font-family: 'Cinzel', serif; font-size: 1.7rem; color: var(--gold); margin: 0; }
        
        main { 
            flex-grow: 1; overflow-y: auto; padding: 20px 15px; -webkit-overflow-scrolling: touch;
        }
        .container { max-width: 500px; margin: 0 auto; }
        
        .admin-nav { display: flex; gap: 10px; margin-bottom: 20px; }
        .nav-btn { flex: 1; padding: 12px; background: #111; border: 1px solid #333; color: #fff; border-radius: 12px; cursor: pointer; font-weight: bold; font-size: 0.85rem; }
        .nav-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(212, 175, 55, 0.1); }
        
        .stats-box { display: flex; gap: 8px; margin-bottom: 20px; }
        .stat-item { flex: 1; background: #111; border: 1px solid #222; padding: 10px; border-radius: 12px; text-align: center; }
        .stat-item span { display: block; font-size: 0.6rem; color: #888; }
        .stat-item b { font-size: 1.1rem; color: var(--gold); }

        .card { background: var(--card); border-radius: 20px; border: 1px solid #222; padding: 20px; margin-bottom: 20px; }
        .status-Accepted { border-right: 5px solid #28a745; }
        .status-Rejected { border-right: 5px solid #dc3545; }
        .status-Pending { border-right: 5px solid #ffc107; }

        .time-tag { background: var(--gold); color: #000; padding: 5px 12px; border-radius: 8px; font-weight: 900; display: inline-block; margin-bottom: 10px; font-size: 0.8rem; }
        .name { font-size: 1.2rem; color: var(--gold); font-weight: bold; margin-bottom: 5px; }
        .info { font-size: 0.85rem; color: #bbb; margin-bottom: 15px; }
        
        .actions { display: flex; gap: 8px; }
        .btn { flex: 1; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 0.8rem; }
        .btn-acc { background: #28a745; color: white; }
        .btn-rej { background: #dc3545; color: white; }
        .btn-del { background: #444; color: white; flex: 0.4; }

        .note-area { margin-top: 15px; background: #000; border-radius: 12px; padding: 10px; border: 1px solid #222; }
        textarea { width: 100%; background: transparent; border: none; color: #fff; outline: none; resize: none; font-family: inherit; }
        .save-note { background: var(--gold); color: #000; border: none; padding: 10px; border-radius: 10px; width: 100%; margin-top: 8px; font-weight: bold; cursor: pointer; }
        
        input { width: 100%; padding: 12px; background: #111; border: 1px solid #333; color: #fff; border-radius: 10px; box-sizing: border-box; margin-bottom: 10px; }
        
        .list-item { display: flex; align-items: center; gap: 15px; background: #111; padding: 10px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #222; }
        .list-item img { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; }
        
        footer { 
            flex-shrink: 0; background: #080808; border-top: 1px solid var(--gold); 
            padding: 30px 0; 
            text-align: center; z-index: 100;
        }
        .signature { font-family: 'Cinzel'; color: var(--gold); font-size: 0.9rem; text-decoration: none; font-weight: bold; letter-spacing: 1.5px; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>

<div id="app-wrapper">
    <div id="login-overlay">
        <div class="login-box">
            <h2 style="color:var(--gold); font-family:'Cinzel';">RAYAN ADMIN</h2> 
            <input type="password" id="passInput" placeholder="پاسۆرد..." style="text-align:center;">
            <button class="save-note" onclick="checkPass()">ENTER</button>
            <p id="err" style="color:red; font-size:0.8rem; margin-top:10px; display:none;">خەلەتە!</p>
        </div>
    </div>

    <header><h1>RAYAN ADMIN</h1></header> 

    <main>
        <div class="container">
            <div class="admin-nav">
                <button class="nav-btn active" onclick="openTab(event, 'tab-bookings')">ژڤان</button>
                <button class="nav-btn" onclick="openTab(event, 'tab-styles')">ستایل</button>
                <button class="nav-btn" onclick="openTab(event, 'tab-shop')">کەل و پەل</button>
            </div>

            <div id="tab-bookings" class="tab-content active">
                <div class="stats-box">
                    <div class="stat-item"><span>هەمی</span><b id="count-all">0</b></div>
                    <div class="stat-item"><span>وەرگرتی</span><b id="count-acc">0</b></div>
                    <div class="stat-item"><span>ل هیڤیێ</span><b id="count-pen">0</b></div>
                </div>
                <div id="bookingList">ل هیڤیێ بن...</div>
            </div>

            <div id="tab-styles" class="tab-content">
                <div class="card">
                    <input type="text" id="stName" placeholder="ناڤێ ستایلی">
                    <input type="text" id="stImg" placeholder="لینکا وێنەی">
                    <button class="save-note" onclick="addStyle()">زێدەکرنا ستایلی</button>
                </div>
                <div id="styleDisplay"></div>
            </div>

            <div id="tab-shop" class="tab-content">
                <div class="card">
                    <input type="text" id="pdName" placeholder="ناڤێ کەرەستەی">
                    <input type="text" id="pdPrice" placeholder="بها">
                    <input type="text" id="pdImg" placeholder="لینکا وێنەی">
                    <button class="save-note" onclick="addProduct()">زێدەکرنا کەرەستەی</button>
                </div>
                <div id="productDisplay"></div>
            </div>
        </div>
    </main>

    <footer>
        <a href="https://instagram.com/sakardusteki" class="signature">DESIGNED BY: SAKARDUSTEKI</a> <!-- ناوی ئەکاونت لابرا -->
    </footer>
</div>

<script>
    function checkPass() {
        if(document.getElementById('passInput').value === "rayan2026") {
            document.getElementById('login-overlay').style.display = 'none';
            sessionStorage.setItem('isLoggedRayan', 'true');
        } else { document.getElementById('err').style.display = 'block'; }
    }
    if(sessionStorage.getItem('isLoggedRayan') === 'true') { document.getElementById('login-overlay').style.display = 'none'; }

    const config = { 
        apiKey: "AIzaSyDVj4rqZ3pMPrF_MVKlRjQwLLCHc56B6uM", 
        databaseURL: "https://rayan-barber-default-rtdb.firebaseio.com/" 
    };
    firebase.initializeApp(config);
    const db = firebase.database();

    function openTab(evt, t) {
        document.querySelectorAll('.tab-content').forEach(x => x.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active'));
        document.getElementById(t).classList.add('active');
        evt.currentTarget.classList.add('active');
        document.querySelector('main').scrollTop = 0;
    }

    db.ref('bookings').on('value', snap => {
        const div = document.getElementById('bookingList');
        div.innerHTML = "";
        let all=0, acc=0, pen=0;
        if(!snap.exists()) { div.innerHTML = "چو ژڤان نینن"; return; }
        
        let data = [];
        snap.forEach(c => { data.push({id: c.key, ...c.val()}); });
        data.reverse().forEach(b => {
            all++;
            if(b.status === 'Accepted') acc++;
            if(b.status === 'Pending') pen++;

            div.innerHTML += `
                <div class="card status-${b.status}">
                    <div class="time-tag">${b.day} | ${b.time}</div>
                    <div class="name">${b.name}</div>
                    <div class="info">📱 ${b.phone} | ✂️ ${b.service} | <b>${b.status}</b></div>
                    <div class="actions">
                        <button class="btn btn-acc" onclick="doUpdate('${b.id}', 'Accepted')">Accept</button>
                        <button class="btn btn-rej" onclick="doUpdate('${b.id}', 'Rejected')">Reject</button>
                        <button class="btn btn-del" onclick="doDelete('bookings/${b.id}')"><i class="fas fa-trash"></i></button>
                    </div>
                    <div class="note-area">
                        <textarea id="note-${b.id}" rows="2" placeholder="تێبینی...">${b.note || ''}</textarea>
                        <button class="save-note" onclick="doNote('${b.id}')">Save Note</button>
                    </div>
                </div>`;
        });
        document.getElementById('count-all').innerText = all;
        document.getElementById('count-acc').innerText = acc;
        document.getElementById('count-pen').innerText = pen;
    });

    function doUpdate(id, s) { db.ref('bookings/' + id).update({status: s}); }
    function doNote(id) { 
        const txt = document.getElementById('note-' + id).value;
        db.ref('bookings/' + id).update({note: txt}).then(() => alert("پاراست"));
    }
    function doDelete(path) { if(confirm('ئەرێ تو پشتڕاستی؟')) db.ref(path).remove(); } <!-- نووسینی بادینی -->

    function addStyle() {
        const n = document.getElementById('stName').value; const i = document.getElementById('stImg').value;
        if(n && i) { db.ref('styles').push({title: n, img: i}).then(()=> {document.getElementById('stName').value=""; document.getElementById('stImg').value="";}); }
    }
    db.ref('styles').on('value', snap => {
        const div = document.getElementById('styleDisplay'); div.innerHTML = "";
        snap.forEach(c => { div.innerHTML += `<div class="list-item"><img src="${c.val().img}"> <span>${c.val().title}</span> <button class="btn-rej" style="padding:5px" onclick="doDelete('styles/${c.key}')">X</button></div>`; });
    });

    function addProduct() {
        const n = document.getElementById('pdName').value; const p = document.getElementById('pdPrice').value; const i = document.getElementById('pdImg').value;
        if(n && p && i) { db.ref('products').push({title: n, price: p, img: i}).then(()=> {document.getElementById('pdName').value=""; document.getElementById('pdPrice').value=""; document.getElementById('pdImg').value="";}); }
    }
    db.ref('products').on('value', snap => {
        const div = document.getElementById('productDisplay'); div.innerHTML = "";
        snap.forEach(c => { div.innerHTML += `<div class="list-item"><img src="${c.val().img}"> <span>${c.val().title} (${c.val().price})</span> <button class="btn-rej" style="padding:5px" onclick="doDelete('products/${c.key}')">X</button></div>`; });
    });
</script>
</body>
</html>
