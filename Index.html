<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>RAYAN BARBER SHOP</title>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.0.0/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Noto+Sans+Arabic:wght@400;700&display=swap');
        :root { --gold: #D4AF37; --card-bg: rgba(10, 10, 10, 0.98); }
        body { background: linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.9)), url('https://images.unsplash.com/photo-1599351397837-a0b25e799f1f?q=80&w=1887&auto=format&fit=crop'); background-size: cover; background-position: center; background-attachment: fixed; color: #fff; font-family: 'Noto Sans Arabic', sans-serif; margin: 0; padding: 0; height: 100vh; overflow: hidden; }
        header { text-align: center; padding: 15px 0; background: #000; border-bottom: 2px solid var(--gold); }
        header h1 { font-family: 'Cinzel', serif; font-size: 1.8rem; color: var(--gold); margin: 0; }
        main { height: calc(100vh - 160px); overflow-y: auto; padding: 15px; -webkit-overflow-scrolling: touch; }
        .container { max-width: 450px; margin: 0 auto; }
        .vip-card { background: var(--card-bg); border-radius: 20px; border: 1px solid rgba(212, 175, 55, 0.2); padding: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        label { display: block; color: var(--gold); margin: 10px 0 5px; font-weight: bold; font-size: 0.8rem; }
        input, select { width: 100%; padding: 12px; background: #000; border: 1px solid #333; border-radius: 10px; color: #fff; box-sizing: border-box; }
        .btn-gold { width: 100%; padding: 16px; background: linear-gradient(135deg, #D4AF37, #B8860B); border: none; border-radius: 12px; color: #000; font-weight: 900; font-size: 1rem; cursor: pointer; margin-top: 15px; }
        .btn-gold:disabled { background: #444; color: #888; }
        .status-box { margin-top: 10px; background: #0a0a0a; border-radius: 15px; padding: 20px; border-right: 5px solid var(--gold); position: relative; border: 1px solid #222; }
        .del-btn { position: absolute; left: 15px; top: 15px; background: #1a1a1a; color: #ff4d4d; border: 1px solid #ff4d4d; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .fixed-footer { position: fixed; bottom: 0; left: 0; right: 0; background: #080808; border-top: 1px solid #333; z-index: 2000; }
        .dev-sig { text-align: center; padding: 8px; font-size: 0.75rem; }
        .dev-sig a { color: var(--gold); text-decoration: none; font-weight: bold; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .nav-bar { display: flex; justify-content: space-around; padding: 10px 0 25px; }
        .nav-item { color: #555; text-align: center; font-size: 0.7rem; flex: 1; cursor: pointer; }
        .nav-item.active { color: var(--gold); }
        .badge { display: inline-block; padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: bold; margin-bottom: 8px; }
        .badge-wait { background: #333; color: #ffc107; }
        .badge-done { background: #1b4d27; color: #2ecc71; }
        .badge-reject { background: #4d1b1b; color: #e74c3c; }
        .note-box { background: rgba(212, 175, 55, 0.1); padding: 10px; margin-top: 12px; border-radius: 10px; border: 1px dashed var(--gold); font-size: 0.85rem; color: #eee; }
    </style>
</head>
<body>
    <header><h1>RAYAN</h1></header>
    <main>
        <div class="container">
            <div id="tab-booking">
                <div id="bookingFormUI">
                    <div class="vip-card">
                        <label>ناڤێ تە</label>
                        <input type="text" id="custName" placeholder="ناڤێ تە">
                        <label>ژمارا مۆبایلێ</label>
                        <input type="tel" id="custPhone" placeholder="0750xxxxxxx">
                        <div style="display: flex; gap: 10px;">
                            <div style="flex:1"><label>ڕۆژ</label><select id="resDay"></select></div>
                            <div style="flex:1"><label>دەمژمێر</label><select id="resTime"></select></div>
                        </div>
                        <label>جۆرێ کارى</label>
                        <select id="resService">
                            <option>پرچ ب تنێ</option><option>ڕیهـ ب تنێ</option>
                            <option>پرچ و ڕیهـ</option><option>تەنیف و ماسک</option>
                        </select>
                        <button class="btn-gold" id="submitBtn" onclick="submitBooking()">تۆمارکرنا ژڤانی</button>
                    </div>
                </div>
                <div id="statusUI"></div>
            </div>
            <div id="tab-styles" style="display:none;"><div id="styles-list" style="display: grid; grid-template-columns: 1fr 1fr; gap:10px;"></div></div>
            <div id="tab-shop" style="display:none;"><div id="tools-list" style="display: grid; grid-template-columns: 1fr 1fr; gap:10px;"></div></div>
        </div>
    </main>
    <div class="fixed-footer">
        <div class="dev-sig">
            <a href="https://instagram.com/sakardusteki" target="_blank">
                <i class="fab fa-instagram" style="font-size: 1.1rem;"></i> DESIGNED BY SAKARDUSTEKI
            </a>
        </div>
        <div class="nav-bar">
            <div class="nav-item active" onclick="showTab('booking', this)"><i class="fas fa-calendar-alt"></i> ژڤان</div>
            <div class="nav-item" onclick="showTab('styles', this)"><i class="fas fa-cut"></i> ستایل</div>
            <div class="nav-item" onclick="showTab('shop', this)"><i class="fas fa-shopping-bag"></i> دوکان</div>
        </div>
    </div>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyDVj4rqZ3pMPrF_MVKlRjQwLLCHc56B6uM", 
        databaseURL: "https://rayan-barber-default-rtdb.firebaseio.com/" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function showTab(t, el) {
        document.getElementById('tab-booking').style.display = (t==='booking')?'block':'none';
        document.getElementById('tab-styles').style.display = (t==='styles')?'block':'none';
        document.getElementById('tab-shop').style.display = (t==='shop')?'block':'none';
        document.querySelectorAll('.nav-item').forEach(x => x.classList.remove('active'));
        el.classList.add('active');
    }

    const days = ["شەمبی", "ئێکشەمبی", "دووشەمبی", "سێشەمبی", "چوارشەمبی", "پێنجشەمبی", "ئەینی"];
    const daySelect = document.getElementById('resDay');
    days.forEach(d => { let o = document.createElement('option'); o.text = d; daySelect.add(o); });

    function loadTimes() {
        const slots = [];
        for(let h=10; h<=23; h++) { 
            let p = h>=17 ? "شەڤ" : (h>=12 ? "نیڤڕۆ" : "سپێدە");
            let d = h>12 ? h-12 : h;
            ["00", "15", "30", "45"].forEach(m => slots.push(`${d}:${m} ${p}`));
        }
        
        db.ref('bookings').on('value', snap => {
            const timeEl = document.getElementById('resTime');
            if(!timeEl) return;
            const data = snap.val() || {};
            const currentDay = document.getElementById('resDay').value;
            timeEl.innerHTML = "";
            slots.forEach(s => {
                const isFull = Object.values(data).some(b => b.day === currentDay && b.time === s && b.status === 'Accepted');
                let opt = document.createElement('option'); opt.value = s; opt.text = s;
                if(isFull) { opt.disabled = true; opt.text += " (گیراوە)"; }
                timeEl.add(opt);
            });
        });
    }
    daySelect.onchange = loadTimes; loadTimes();

    function updateUI() {
        const myID = localStorage.getItem('myRayanID');
        const formDiv = document.getElementById('bookingFormUI');
        const statusDiv = document.getElementById('statusUI');
        if (!myID) { formDiv.style.display = "block"; statusDiv.innerHTML = ""; return; }

        db.ref('bookings/' + myID).on('value', snap => {
            if (snap.exists()) {
                const b = snap.val();
                formDiv.style.display = "none";
                let txt = "تە بۆ ڕەیانی فرێکر، هیڤییە چاوەڕێ بە ⏳"; let cls = "badge-wait";
                if(b.status === 'Accepted') { txt = "هاتە وەرگرتن ✅"; cls = "badge-done"; }
                if(b.status === 'Rejected') { txt = "ڕەیانی ڕەتکر ❌"; cls = "badge-reject"; }

                statusDiv.innerHTML = `
                    <div class="status-box">
                        <button class="del-btn" onclick="deleteBooking('${myID}')"><i class="fas fa-trash"></i></button>
                        <div style="padding-right: 50px;">
                            <span class="badge ${cls}">${txt}</span><br>
                            <b style="color:var(--gold); font-size:1.2rem;">${b.day} | ${b.time}</b><br>
                            <small style="color:#888;">${b.service}</small>
                            ${b.note ? `<div class="note-box"><b>تێبینیەک ژ ڕەیانی:</b><br>${b.note}</div>` : ''}
                        </div>
                    </div>`;
            } else { localStorage.removeItem('myRayanID'); formDiv.style.display = "block"; }
        });
    }

    function submitBooking() {
        const name = document.getElementById('custName').value.trim();
        const phone = document.getElementById('custPhone').value.trim();
        if(!name || !phone) return alert("ناڤ و مۆبایل بنڤیسە!");
        
        db.ref('bookings').once('value', snap => {
            let foundKey = null;
            snap.forEach(c => { if(c.val().phone === phone) foundKey = c.key; });
            if(foundKey) { localStorage.setItem('myRayanID', foundKey); updateUI(); }
            else {
                const newRef = db.ref('bookings').push();
                newRef.set({ name, phone, day: document.getElementById('resDay').value, time: document.getElementById('resTime').value, service: document.getElementById('resService').value, status: 'Pending' })
                .then(() => { localStorage.setItem('myRayanID', newRef.key); updateUI(); });
            }
        });
    }

    function deleteBooking(id) { if(confirm("ئەرێ تو دەتەوێت ژڤانێ خۆ ڕەش بکەیت؟")) { localStorage.removeItem('myRayanID'); db.ref('bookings/' + id).set(null).then(() => { location.reload(); }); } }

    updateUI();

    db.ref('styles').on('value', snap => {
        const l = document.getElementById('styles-list'); if(!l) return; l.innerHTML = "";
        snap.forEach(c => { l.innerHTML += `<div style="background:#111; border-radius:12px; overflow:hidden; border:1px solid #222; text-align:center;"><img src="${c.val().img}" style="width:100%; height:110px; object-fit:cover;"><p style="font-size:0.7rem; padding:5px;">${c.val().title}</p></div>`; });
    });
    db.ref('products').on('value', snap => {
        const l = document.getElementById('tools-list'); if(!l) return; l.innerHTML = "";
        snap.forEach(c => { l.innerHTML += `<div style="background:#111; border-radius:12px; overflow:hidden; border:1px solid #222; text-align:center;"><img src="${c.val().img}" style="width:100%; height:110px; object-fit:cover;"><p style="font-size:0.7rem; padding:5px;">${c.val().title}<br><span style="color:var(--gold)">${c.val().price}</span></p></div>`; });
    });
</script>
</body>
</html>
