<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fêrbûna Îngilîzî - Çîrokên Sînema</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0f18; /* Deep cinematic black/blue */
            --bg-card: #141b29;
            --text-en: #f8fafc;
            --text-ku: #94a3b8;
            --accent: #eab308; /* Cinematic Gold */
            --play-btn: #3b82f6; /* Blue for audio */
            --danger: #ef4444; /* Red for delete */
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-en);
            font-family: 'Cairo', sans-serif;
            line-height: 1.6;
            padding-bottom: 50px;
        }

        /* Cinematic Header */
        header {
            background: linear-gradient(to bottom, #000000, transparent);
            padding: 40px 20px 20px;
            text-align: center;
            border-bottom: 1px solid #1e293b;
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(15px);
        }

        h1 {
            color: var(--accent);
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 2px 15px rgba(234, 179, 8, 0.4);
            font-weight: 900;
        }
        
        .subtitle {
            color: var(--text-ku);
            font-size: 1.1rem;
            margin-bottom: 25px;
        }

        /* Navigation Buttons */
        .nav-buttons {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .nav-btn {
            background-color: var(--bg-card);
            color: white;
            border: 1px solid #334155;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .nav-btn:hover {
            background-color: var(--accent);
            color: #000;
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .nav-btn.active {
            background-color: var(--accent);
            color: #000;
            border-color: var(--accent);
            box-shadow: 0 4px 15px rgba(234, 179, 8, 0.4);
        }

        /* Main Content */
        main {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .story-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .story-title-en {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            color: #fff;
            direction: ltr;
        }

        .story-title-ku {
            font-size: 1.3rem;
            color: var(--accent);
            margin-top: 5px;
            font-weight: 700;
        }

        /* Sentence Cards */
        .sentence-card {
            background-color: var(--bg-card);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 20px;
            border-right: 4px solid transparent;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            position: relative;
            overflow: hidden;
        }

        .sentence-card:hover {
            border-right-color: var(--accent);
            transform: translateX(-5px);
        }

        .text-en {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            margin-bottom: 12px;
            color: var(--text-en);
            cursor: pointer;
            direction: ltr;
            text-align: left;
            transition: color 0.3s;
        }

        .text-en:hover {
            color: var(--play-btn);
        }

        .text-ku {
            font-size: 1.2rem;
            color: var(--text-ku);
            direction: rtl;
            border-top: 1px dashed #334155;
            padding-top: 15px;
            margin-bottom: 20px;
        }

        /* Card Actions */
        .actions {
            display: flex;
            gap: 12px;
            direction: rtl;
        }

        .action-btn {
            padding: 8px 16px;
            font-size: 14px;
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
            border-radius: 8px;
            border: 1px solid;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .btn-play { background: rgba(59, 130, 246, 0.1); border-color: var(--play-btn); color: var(--play-btn); }
        .btn-play:hover { background: var(--play-btn); color: white; }

        .btn-save { background: rgba(234, 179, 8, 0.1); border-color: var(--accent); color: var(--accent); }
        .btn-save:hover { background: var(--accent); color: black; }

        /* Reading Animation */
        .reading {
            color: var(--accent) !important;
            text-shadow: 0 0 10px rgba(234, 179, 8, 0.5);
        }

        /* Saved Section */
        #saved-section { display: none; }
        
        .saved-item {
            background-color: var(--bg-card);
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 15px;
            border-right: 4px solid var(--play-btn);
        }

        .btn-delete {
            background: rgba(239, 68, 68, 0.1); border-color: var(--danger); color: var(--danger);
            margin-top: 15px;
        }
        .btn-delete:hover { background: var(--danger); color: white; }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--accent);
            color: #000;
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 16px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 1000;
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

    </style>
</head>
<body>

    <header>
        <h1>🎬 چیرۆکێن زێڕین</h1>
        <p class="subtitle">فێربوونا ئینگلیزیێ ب رێکا چیرۆکێن ڕاستەقینە و ب هێز</p>
        <div class="nav-buttons" id="nav-container">
            <!-- Buttons dynamically added -->
        </div>
    </header>

    <main>
        <div id="story-container">
            <!-- Story content loads here -->
        </div>

        <div id="saved-section">
            <h2 style="color: var(--accent); text-align: center; margin-bottom: 30px; font-size: 2rem;">⭐ ڕستەیێن من یێن پاراستی</h2>
            <div id="saved-list">
                <!-- Saved items load here -->
            </div>
        </div>
    </main>

    <div class="toast" id="toast">✅ ڕستە هاتە پاراستن!</div>

    <script>
        // --- 1. زانیاریێن چیرۆکان (داتابەیس) ---
        const stories =[
            {
                id: 1,
                titleEn: "Apollo 13: Survival in Space",
                titleKu: "ئەپۆلۆ ١٣: مانا ل ژیانێ د بۆشایییا ئاسمانیدا",
                content:[
                    { en: "In 1970, NASA launched the Apollo 13 mission to the moon.", ku: "د سالا ١٩٧٠ێ دا، ناسا مێشنا ئەپۆلۆ ١٣ بەرەڤ هەیڤێ بڕێکر." },
                    { en: "Three astronauts were inside the spacecraft, expecting a normal journey.", ku: "سێ ئاسمانڤان دناڤ کەشتییا ئاسمانیدا بوون، چاڤەڕێی گەشتەکا ئاسایی بوون." },
                    { en: "Suddenly, a loud explosion shook the entire ship.", ku: "ژ نشکێڤە، تەقینەکا مەزن هەمی کەشتی هەژاند." },
                    { en: "An oxygen tank had exploded, destroying their life support system.", ku: "تەنکییەکا ئۆکسجینێ پەقیبوو، و سیستەمێ وان یێ ژیانێ تێکدابوو." },
                    { en: "The commander took the radio and said the famous words:", ku: "فەرمانداری ڕادیۆ هەلگرت و ئەو پەیڤێن ناڤدار گۆتن:" },
                    { en: "Houston, we have a problem.", ku: "هیوستن، ئەم تووشی ئاریشەیەکێ بووینە." },
                    { en: "They were 200,000 miles away from Earth, freezing and running out of air.", ku: "ئەو ٢٠٠،٠٠٠ میل ژ ئەردی دویر بوون، دجەمدین و هەوایێ وان ب دوماهی دهات." },
                    { en: "The engineers on Earth worked day and night to find a solution.", ku: "ئەندازیارێن ل سەر ئەردی شەڤ و رۆژ کارکرن داکو چارەسەرییەکێ ببینن." },
                    { en: "Against all odds, the astronauts used the lunar module as a lifeboat.", ku: "تەڤی هەمی زەحمەتییان، ئاسمانڤانان بەشێ هەیڤێ وەکو کەشتییەکا رزگارکرنێ بکارئینا." },
                    { en: "Four days later, they safely returned to Earth, becoming heroes.", ku: "چوار رۆژ پاشتر، ئەو ب سەلامەتی ڤەگەڕیان ئەردی، و بوونە قەهرەمان." }
                ]
            },
            {
                id: 2,
                titleEn: "The Great Escape from Alcatraz",
                titleKu: "ڕەڤینا مەزن ژ زیندانا ئەلکاتراز",
                content:[
                    { en: "Alcatraz was the most secure prison in the world.", ku: "ئەلکاتراز ئارامترین زیندان بوو ل جیهانێ." },
                    { en: "It was built on an island surrounded by freezing water and strong currents.", ku: "ل سەر دورگەیەکێ هاتبوو ئاڤاکرن کو ب ئاڤا بەستێ و پێلێن بهێز هاتبوو دەوروبەرکرن." },
                    { en: "Everyone believed that escaping from Alcatraz was impossible.", ku: "هەمی کەسان باوەر دکر کو ڕەڤین ژ ئەلکاترازێ تشتەکێ مەحالە." },
                    { en: "However, in 1962, three clever prisoners made a secret plan.", ku: "لێ بەلێ، د سالا ١٩٦٢ێ دا، سێ زیندانییێن زیرەک پلانەکا نهێنی دانا." },
                    { en: "For months, they used spoons and coins to dig holes in their cell walls.", ku: "بۆ چەندین هەیڤان، وان کەڤچک و پارەیێن ئاسن بکارئینان داکو کونان د دیوارێن ژوورا خۆ دا بکۆلن." },
                    { en: "They made fake heads out of paper and soap to fool the guards.", ku: "وان سەرێن ساختە ژ کاغەز و سابینێ چێکرن داکو پاسەڤانان بخاپینن." },
                    { en: "One dark night, they climbed through the holes and reached the roof.", ku: "شەڤەکا تاری، ئەو د کونان را سەرکەفتن و گەهشتنە سەربانی." },
                    { en: "They built a raft using stolen raincoats and sailed into the dark ocean.", ku: "وان بەلەمەک ژ قاپووتێن بارانێ یێن دزی چێکر و بەرەڤ ئۆقیانووسا تاری چوون." },
                    { en: "The next morning, the guards found the fake heads in the beds.", ku: "سپێدەهیا دی، پاسەڤانان سەرێن ساختە دناڤ نڤینان دا دیتن." },
                    { en: "To this day, nobody knows if the men survived or drowned in the sea.", ku: "هەتا ئەڤرۆ، کەس نزانیت کا ئەو زەلام رزگار بوون یان د دەریایێ دا خەندقین." }
                ]
            },
            {
                id: 3,
                titleEn: "Hachiko: The Loyal Dog",
                titleKu: "هاچیکۆ: سەگێ وەفادار",
                content:[
                    { en: "Hachiko was a dog who lived in Japan in the 1920s.", ku: "هاچیکۆ سەگەک بوو کو ل سالێن ١٩٢٠ێ ل یابانێ دژیا." },
                    { en: "Every day, he waited at the train station for his owner to return from work.", ku: "هەر رۆژ، ل وێستگەها شەمەندەفەرێ چاڤەڕێی خودانێ خۆ دکر کو ژ کاری ڤەگەڕیت." },
                    { en: "One day, his owner suffered a sudden stroke and died at work.", ku: "رۆژەکێ، خودانێ وی تووشی جەلتەیەکا نشکێڤە بوو و ل سەر کاری گیانێ خۆ ژ دەست دا." },
                    { en: "He never came back on the train that evening.", ku: "ئەو چ جاران د وێ ئێڤاریێ دا ب شەمەندەفەرێ نەڤەگەڕیا." },
                    { en: "But Hachiko did not understand that his friend was gone forever.", ku: "لێ هاچیکۆی تێنەگەهشت کو هەڤاڵێ وی بۆ هەمیشە یێ چویی." },
                    { en: "For the next nine years, the loyal dog returned to the station every single day.", ku: "بۆ نەهـ سالێن دی، ئەو سەگێ وەفادار هەر رۆژ دچووە وێستگەهێ." },
                    { en: "He sat in the exact same spot, waiting for the train to arrive.", ku: "ئەو ڕێک ل هەمان جهـ دروونشت، و چاڤەڕێی هاتنا شەمەندەفەرێ دکر." },
                    { en: "People who traveled daily started to notice him and brought him food.", ku: "ئەو کەسێن کو رۆژانە گەشت دکرن، پێ حەسیان و خارن بۆ دئینا." },
                    { en: "Hachiko became a national symbol of loyalty and unconditional love.", ku: "هاچیکۆ بووە سیمبولەکێ نەتەوەیی یێ وەفاداری و حەژێکرنا بێ مەرج." },
                    { en: "Today, a bronze statue of Hachiko stands exactly where he used to wait.", ku: "ئەڤرۆ، پەییکەرەکێ برۆنزی یێ هاچیکۆی ل هەمان وی جهی یێ هاتیە دانان کو لێ چاڤەڕێ دکر." }
                ]
            }
        ];

        // --- 2. لۆجیکێ ئەپلیکەیشنی ---
        const navContainer = document.getElementById('nav-container');
        const storyContainer = document.getElementById('story-container');
        const savedSection = document.getElementById('saved-section');
        const savedList = document.getElementById('saved-list');

        function initApp() {
            navContainer.innerHTML = '';
            // دوکمەیێن چیرۆکان
            stories.forEach(story => {
                const btn = document.createElement('button');
                btn.className = 'nav-btn';
                btn.innerText = story.titleKu;
                btn.onclick = () => openStory(story.id);
                btn.id = `btn-story-${story.id}`;
                navContainer.appendChild(btn);
            });

            // دوکمەیا سەیڤکریان
            const favBtn = document.createElement('button');
            favBtn.className = 'nav-btn';
            favBtn.innerHTML = '⭐ پاراستی';
            favBtn.style.borderColor = 'var(--accent)';
            favBtn.onclick = openSaved;
            favBtn.id = 'btn-saved';
            navContainer.appendChild(favBtn);

            openStory(1); // ڤەکرنا چیرۆکا ئێکێ وەکو دەستپێک
        }

        function openStory(id) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`btn-story-${id}`).classList.add('active');

            savedSection.style.display = 'none';
            storyContainer.style.display = 'block';
            storyContainer.innerHTML = '';

            const story = stories.find(s => s.id === id);

            // سەردێڕێ چیرۆکێ
            storyContainer.innerHTML = `
                <div class="story-header">
                    <h2 class="story-title-en">${story.titleEn}</h2>
                    <h3 class="story-title-ku">${story.titleKu}</h3>
                </div>
            `;

            // ڕستەیێن چیرۆکێ
            story.content.forEach((line, index) => {
                const safeEn = line.en.replace(/'/g, "\\'").replace(/"/g, "&quot;");
                const safeKu = line.ku.replace(/'/g, "\\'").replace(/"/g, "&quot;");
                const elementId = `text-${id}-${index}`;

                const card = document.createElement('div');
                card.className = 'sentence-card';
                card.innerHTML = `
                    <p class="text-en" id="${elementId}" onclick="playAudio('${safeEn}', '${elementId}')">${line.en}</p>
                    <p class="text-ku">${line.ku}</p>
                    <div class="actions">
                        <button class="action-btn btn-play" onclick="playAudio('${safeEn}', '${elementId}')">🔊 گوهداری</button>
                        <button class="action-btn btn-save" onclick="saveToFavorites('${safeEn}', '${safeKu}')">⭐ سەیڤ بکە</button>
                    </div>
                `;
                storyContainer.appendChild(card);
            });
        }

        // --- 3. سیستەمێ خاندنا دەنگی (Text to Speech) ---
        function playAudio(text, elementId) {
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel(); // راوەستاندنا دەنگێ بەرێ

                const speech = new SpeechSynthesisUtterance(text);
                speech.lang = 'en-US';
                speech.rate = 0.85; // خاڤتر داکو باش تێبگەهیت
                speech.pitch = 1;

                const textElement = document.getElementById(elementId);
                
                // ئەنیمەیشنا ڕەنگێ زێڕین دەمێ دخوینیت
                speech.onstart = () => { if(textElement) textElement.classList.add('reading'); };
                speech.onend = () => { if(textElement) textElement.classList.remove('reading'); };
                speech.onerror = () => { if(textElement) textElement.classList.remove('reading'); };

                window.speechSynthesis.speak(speech);
            } else {
                alert("مخابن، براوزەرێ تە دەنگی پشگیری ناکەت.");
            }
        }

        // --- 4. سیستەمێ پاراستنێ (Local Storage) ---
        function saveToFavorites(enText, kuText) {
            let savedItems = JSON.parse(localStorage.getItem('englishStoriesSaved')) ||[];
            
            // پشکنین کا بەری نوکە هاتیە سەیڤکرن
            const isExist = savedItems.find(item => item.en === enText);
            
            if (!isExist) {
                savedItems.push({ en: enText, ku: kuText, id: Date.now() });
                localStorage.setItem('englishStoriesSaved', JSON.stringify(savedItems));
                showToast("✅ ڕستە ب سەرکەفتیانە هاتە پاراستن!");
            } else {
                showToast("⚠️ ئەڤ ڕستەیە بەری نوکە یا هاتیە پاراستن.");
            }
        }

        function openSaved() {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-saved').classList.add('active');

            storyContainer.style.display = 'none';
            savedSection.style.display = 'block';
            renderSavedList();
        }

        function renderSavedList() {
            savedList.innerHTML = '';
            let savedItems = JSON.parse(localStorage.getItem('englishStoriesSaved')) ||[];

            if (savedItems.length === 0) {
                savedList.innerHTML = '<p style="text-align:center; color:var(--text-ku); font-size:1.2rem;">چ ڕستەیێن پاراستی ل ڤێرە نینن. بچە چیرۆکان و ستێرکێ ⭐ دابگرە.</p>';
                return;
            }

            // نیشاندانا ژ نویترین بۆ کەڤنترین
            savedItems.sort((a, b) => b.id - a.id).forEach(item => {
                const safeEn = item.en.replace(/'/g, "\\'").replace(/"/g, "&quot;");
                const elementId = `saved-${item.id}`;

                const card = document.createElement('div');
                card.className = 'saved-item';
                card.innerHTML = `
                    <p class="text-en" id="${elementId}" onclick="playAudio('${safeEn}', '${elementId}')" style="margin-bottom:5px;">${item.en} 🔊</p>
                    <p class="text-ku" style="border:none; padding:0; margin-bottom:10px;">${item.ku}</p>
                    <button class="action-btn btn-delete" onclick="deleteSavedItem(${item.id})">❌ ژێبرن</button>
                `;
                savedList.appendChild(card);
            });
        }

        function deleteSavedItem(id) {
            let savedItems = JSON.parse(localStorage.getItem('englishStoriesSaved')) || [];
            const updatedItems = savedItems.filter(item => item.id !== id);
            localStorage.setItem('englishStoriesSaved', JSON.stringify(updatedItems));
            renderSavedList(); // Refresh the list
            showToast("🗑️ ڕستە هاتە ژێبرن.", true);
        }

        // --- 5. نۆتیفیکەیشن (ئاگادارکرن) ---
        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.innerText = message;
            toast.style.background = isError ? "var(--danger)" : "var(--accent)";
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // --- RUN APP ---
        document.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
